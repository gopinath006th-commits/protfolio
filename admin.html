<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Admin Access — Gopinath G</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 fill=%22%2322d3ee%22 font-family=%22monospace%22>G</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<style>
  body{ min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .admin-wrap{ width:min(420px, 92%); padding:20px; }
  .admin-terminal{
    background:var(--bg-1); border:1px solid var(--line); border-radius:var(--radius);
    box-shadow:var(--shadow); overflow:hidden;
  }
  .admin-top{
    display:flex; align-items:center; justify-content:space-between;
    padding:12px 16px; background:var(--bg-2); border-bottom:1px solid var(--line);
  }
  .admin-body{ padding:34px 30px 30px; }
  .admin-lock{
    width:52px; height:52px; border-radius:50%; margin:0 auto 20px;
    background:var(--bg-2); border:1px solid var(--line-strong);
    display:flex; align-items:center; justify-content:center; color:var(--accent-2);
  }
  .admin-lock svg{ width:22px; height:22px; }
  .admin-body h1{ font-size:1.3rem; text-align:center; }
  .admin-sub{
    text-align:center; color:var(--text-2); font-family:var(--font-mono); font-size:.78rem;
    margin-top:8px; margin-bottom:28px;
  }
  .admin-error{
    display:none; align-items:center; gap:8px; font-family:var(--font-mono); font-size:.78rem;
    color:#ff6b6b; background:rgba(255,107,107,.08); border:1px solid rgba(255,107,107,.3);
    padding:10px 14px; border-radius:8px; margin-bottom:18px;
  }
  .admin-error.show{ display:flex; }
  .back-link{
    display:flex; align-items:center; gap:6px; justify-content:center; margin-top:22px;
    font-family:var(--font-mono); font-size:.78rem; color:var(--text-2);
  }
  .back-link:hover{ color:var(--accent-2); }
</style>
</head>
<body>
<div class="ambient" aria-hidden="true"><div class="grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="admin-wrap">
  <div class="admin-terminal">
    <div class="admin-top">
      <div class="editor-dots"><span></span><span></span><span></span></div>
      <div class="editor-file mono">admin_login.sh</div>
      <div style="width:44px"></div>
    </div>
    <div class="admin-body">
      <div class="admin-lock">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
      </div>
      <h1>Restricted Access</h1>
      <p class="admin-sub">// authorized personnel only</p>

      <div class="admin-error" id="loginError">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
        <span>Invalid username or password.</span>
      </div>

      <form id="adminForm">
        <div class="field">
          <label for="adminUser">Username</label>
          <input type="text" id="adminUser" autocomplete="username" required placeholder="Enter username">
        </div>
        <div class="field">
          <label for="adminPass">Password</label>
          <input type="password" id="adminPass" autocomplete="current-password" required placeholder="Enter password">
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; margin-top:6px;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
          Sign In
        </button>
      </form>

      <a href="index.html" class="back-link">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to portfolio
      </a>
    </div>
  </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
